baseURL = "https://orderlychaos.io/"
languageCode = "en-us"
title = "Orderly Chaos"
theme = "PaperMod"

[pagination]
  pagerSize = 10

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "Orderly Chaos"
  description = "Software, electronics, FPGA, motorsport tech, and video synthesis"
  keywords = ["FPGA", "electronics", "motorsport", "CAN bus", "video synthesis", "embedded", "software"]
  # profileMode or homeInfoParams controls the home page layout (see below)
  defaultTheme = "auto"   # "light", "dark", or "auto" (follows system preference)
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false          # flip to true once you set up giscus
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  # Home page info block
  [params.homeInfoParams]
    Title = "Orderly Chaos"
    Content = """Welcome. I'm Nate — a software developer who builds things across the stack: from software to hardware, firmware, FPGA work, and the occasional racecar. \
This blog documents technical projects as they happen: electronics, software, FPGA work, motorsport data systems, and video synthesis. \
Expect build logs, code, schematics, and honest write-ups of what worked and what didn't."""

  # Social links shown in footer / home page
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/nkinder"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  # Syntax highlighting
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    limit = 10
    keys = ["title", "permalink", "summary", "content"]

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true           # allows raw HTML in Markdown (useful for callouts, etc.)
  [markup.highlight]
    noClasses = false         # required for custom syntax highlight CSS
    anchorLineNos = true
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"

[outputs]
  home = ["HTML", "RSS", "JSON"]   # JSON needed for search

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 30
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 40
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 50
